<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>МФЦ — Премии</title>
    <meta name="description" content="Премии МФЦ: голосование за лучший текст и лучшую харизму, номинанты года.">
    <meta name="keywords" content="премия, голосование, номинации, лучший текст, харизма, МФЦ, музыкальная премия">
    <link rel="stylesheet" href="style.css">
    <script src="js/theme.js" defer></script>
</head>
<body>
    <header class="nav-panel">
        <div class="nav-panel-bg"></div>
        <div class="main-nav-panel">
            <div class="nav-left">
                <button class="theme-toggle">light</button>
                <a href="index.html" class="logo">
                    <img id="logo-img" src="img/logo_dark.png" alt="Логотип МФЦ">
                </a>
            </div>
            <a href="cabinet.html" class="account-link">
                <div class="account">
                    <img src="img/avatar.png" alt="Аватар профиля">
                </div>
            </a>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="premii">
                <img src="img/golosyi.png" alt="Голосуй за премию МФЦ">
            </div>

            <div class="zagolovok" style="margin-top:30px;"><p>номинации</p></div>

            <div class="nomination-block">
                <h2 class="nomination-title">лучший текст</h2>

                <div class="nomination-items">
                    <div class="nomination-item">
                        <div class="reliz-card">
                            <img class="reliz-img" src="img/covers/ultraviolet.png" alt="Обложка ultraviolet">
                            <div class="reliz-gradient"></div>
                            <div class="reliz-info">
                                <p class="reliz-title">ultraviolet</p>
                                <p class="reliz-year">2023</p>
                            </div>
                        </div>
                        <div class="vote-pair">
                            <button class="vote-btn">↓</button>
                            <button class="vote-btn">↑</button>
                        </div>
                    </div>
                    <div class="nomination-item">
                        <div class="reliz-card">
                            <img class="reliz-img" src="img/covers/my_beautiful_dark_twisted_fantasy.png" alt="Обложка My Beautiful Dark Twisted Fantasy">
                            <div class="reliz-gradient"></div>
                            <div class="reliz-info">
                                <p class="reliz-title">My Beautiful Dark Twisted Fantasy</p>
                                <p class="reliz-year">2010</p>
                            </div>
                        </div>
                        <div class="vote-pair">
                            <button class="vote-btn">↓</button>
                            <button class="vote-btn">↑</button>
                        </div>
                    </div>
                    <div class="nomination-item">
                        <div class="reliz-card">
                            <img class="reliz-img" src="img/covers/yeezus.png" alt="Обложка Yeezus">
                            <div class="reliz-gradient"></div>
                            <div class="reliz-info">
                                <p class="reliz-title">Yeezus</p>
                                <p class="reliz-year">2013</p>
                            </div>
                        </div>
                        <div class="vote-pair">
                            <button class="vote-btn">↓</button>
                            <button class="vote-btn">↑</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nomination-block">
                <h2 class="nomination-title">лучшая харизма</h2>

                <div class="nomination-items">
                    <div class="nomination-item">
                        <div class="reliz-card">
                            <img class="reliz-img" src="img/covers/anon_ember_xxx.png" alt="Обложка Anon Ember XXX">
                            <div class="reliz-gradient"></div>
                            <div class="reliz-info">
                                <p class="reliz-title">XXX Santa On My D</p>
                                <p class="reliz-year">2026</p>
                            </div>
                        </div>
                        <div class="vote-pair">
                            <button class="vote-btn">↓</button>
                            <button class="vote-btn">↑</button>
                        </div>
                    </div>
                    <div class="nomination-item">
                        <div class="reliz-card">
                            <img class="reliz-img" src="img/covers/based_music.png" alt="Обложка BASED MUSIC">
                            <div class="reliz-gradient"></div>
                            <div class="reliz-info">
                                <p class="reliz-title">BASED MUSIC</p>
                                <p class="reliz-year">2025</p>
                            </div>
                        </div>
                        <div class="vote-pair">
                            <button class="vote-btn">↓</button>
                            <button class="vote-btn">↑</button>
                        </div>
                    </div>
                    <div class="nomination-item">
                        <div class="reliz-card">
                            <img class="reliz-img" src="img/covers/rockstar_cycle.jpg" alt="Обложка Rockstar Cycle">
                            <div class="reliz-gradient"></div>
                            <div class="reliz-info">
                                <p class="reliz-title">Rockstar Cycle</p>
                                <p class="reliz-year">2024</p>
                            </div>
                        </div>
                        <div class="vote-pair">
                            <button class="vote-btn">↓</button>
                            <button class="vote-btn">↑</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>мфц все права защищены</p>
        </footer>
    </main>
</body>
</html>
